name: iProject
options:
  bundleIdPrefix: com.iproject
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    PRODUCT_NAME: "iProject"
    PRODUCT_BUNDLE_IDENTIFIER: com.iproject.app
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual
    ENABLE_HARDENED_RUNTIME: YES
    COMBINE_HIDPI_IMAGES: YES
    ASSETCATALOG_COMPILER_APPICON_NAME: ""
targets:
  iProject:
    type: application
    platform: macOS
    sources:
      - path: Sources
    info:
      path: Sources/ProjexFinder/Info.plist
      properties:
        CFBundleDisplayName: iProject
        CFBundleName: iProject
        LSApplicationCategoryType: public.app-category.developer-tools
        LSMinimumSystemVersion: "14.0"
        NSHighResolutionCapable: true
        NSPrincipalClass: NSApplication
        NSMainNibFile: ""
